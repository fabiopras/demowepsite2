<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Product</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
}

.card {
  border-radius: 20px;
  background: #111827;
}

input {
  background: #1f2937 !important;
  color: white !important;
  border: none !important;
}

input:focus {
  box-shadow: 0 0 10px #22c55e;
}

/* placeholder ชัด */
::placeholder {
  color: #9ca3af !important;
  opacity: 1;
}

/* label */
label {
  font-size: 14px;
  margin-bottom: 4px;
  color: #e5e7eb;
}

img {
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
  <div class="card p-4 shadow-lg" style="width:400px;">
    
    <h3 class="text-center mb-3">➕ Add Product</h3>

    <form method="POST" onsubmit="return validateForm()">
      
      <label>Product Name</label>
      <input id="name" class="form-control mb-2" name="name" placeholder="Enter product name">

      <label>Price ($)</label>
      <input id="price" class="form-control mb-2" name="price" type="number" step="0.01" placeholder="e.g. 29.99">

      <label>Quantity</label>
      <input id="quantity" class="form-control mb-2" name="quantity" type="number" placeholder="e.g. 10">

      <label>Image URL</label>
      <input id="image" class="form-control mb-3" name="image" placeholder="https://example.com/image.jpg">

      <!-- preview -->
      <img id="preview" class="img-fluid mb-3" style="display:none;">

      <button class="btn btn-success w-100">Add Product</button>
      <a href="/" class="btn btn-secondary w-100 mt-2">Back</a>

    </form>
  </div>
</div>

<script>
function validateForm(){
  let name = document.getElementById('name').value;
  let price = document.getElementById('price').value;
  let quantity = document.getElementById('quantity').value;

  if(!name || !price || !quantity){
    alert("Please fill all fields");
    return false;
  }
  return true;
}

// preview image
const imageInput = document.getElementById('image');
const preview = document.getElementById('preview');

imageInput.addEventListener('input', () => {
  if(imageInput.value){
    preview.src = imageInput.value;
    preview.style.display = 'block';
  } else {
    preview.style.display = 'none';
  }
});
</script>

</body>
</html>
